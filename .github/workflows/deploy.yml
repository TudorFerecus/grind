name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - prod
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Map branch to GitHub Environment
    environment:
      name: ${{ github.ref == 'refs/heads/prod' && 'prod' || 'preview' }}
      url: ${{ steps.cloudflare_deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Use GitHub Environment Variables (vars) for URLs and non-sensitive config
          # Use Secrets only for sensitive tokens
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_LED_PUCK_RADIUS: ${{ vars.VITE_LED_PUCK_RADIUS }}

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=grind --branch=${{ github.ref == 'refs/heads/prod' && 'main' || 'staging' }}
